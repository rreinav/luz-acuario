<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xml:lang="es" lang="es">

<head>
  <title>Arduino acuario</title>
  <meta http-equiv="content-type" content="text/html;charset=utf-8" />
  <meta name="keywords" content="arduino, acuario" />
  <meta name="author" content="Rafael Reina Viruel" />
  <link rel="stylesheet" type="text/css" href="css/index.css" />
  <script type="text/javascript">
    // --- Constants ---
    var CW = 800, CH = 500, ML = 45, MR = 15, MT = 20, MB = 30;
    var GW = CW - ML - MR, GH = CH - MT - MB;
    var R_START = 12, R_END = 20, R_PEAK_S = 13.5, R_PEAK_E = 18.5;

    var CURVAS = [
      { key: 'r', color: '#ff6b4a', label: 'R' },
      { key: 'g', color: '#2ea043', label: 'G' },
      { key: 'b', color: '#1a7a7a', label: 'B' },
      { key: 'brillo', color: '#d4e6f0', label: 'Brillo' },
    ];

    // --- State ---
    var minuto = 0, hora = 12, temp = 0, modo24h = false, brillo = 0;
    var rojo = 0, verde = 0, azul = 0;
    var puntosGrafica = [];

    // --- Helpers ---
    function clamp(v, lo, hi) { return v < lo ? lo : v > hi ? hi : v; }
    function pad2(n) { return n < 10 ? '0' + n : '' + n; }
    function decimalHora() { return hora + minuto / 60; }

    // --- Red channel log-curve (k=2) ---
    function rojoLog(h) {
      if (h < R_START || h > R_END) return 0;
      if (h >= R_PEAK_S && h < R_PEAK_E) return 1;
      var x = h < R_PEAK_S
        ? (h - R_START) / (R_PEAK_S - R_START)
        : (R_END - h) / (R_END - R_PEAK_E);
      return Math.log(1 + x * (Math.E * Math.E - 1)) / 2;
    }

    // --- Kelvin → RGB (pure) ---
    function kelvinToRGB(t) {
      if (t <= 0) return { r: 0, g: 0, b: 0 };
      t = t / 100;
      var r, g, b;
      if (t <= 66) {
        r = 255;
        g = clamp(99.4708025861 * Math.log(t) - 161.1195681661, 0, 255);
      } else {
        r = clamp(329.698727446 * Math.pow(t - 60, -0.1332047592), 0, 255);
        g = clamp(288.1221695283 * Math.log(t - 60), 0, 255);
      }
      b = t >= 66 ? 255 : t <= 19 ? 0 : clamp(138.5177312231 * Math.log(t - 10) - 305.0447927307, 0, 255);
      return { r: Math.round(r), g: Math.round(g), b: Math.round(b) };
    }

    // --- RGB with red override ---
    function calcularRGB(t, h) {
      var rgb = kelvinToRGB(t);
      if (h !== undefined) rgb.r = Math.round(255 * rojoLog(h));
      return rgb;
    }

    // --- Display ---
    function mostrarInfo() {
      document.getElementById('tiempo').innerHTML = hora + ':' + pad2(minuto);
      document.getElementById('temperatura').innerHTML = temp + 'K';
    }

    function temperaturaRGB(t, h) {
      if (t <= 0) {
        rojo = verde = azul = 0;
        document.getElementById('rgb').innerHTML = 'r=0, g=0 b=0, i=0.0';
        document.getElementById('acuario').style.background = 'linear-gradient(rgba(0,0,0,1),rgba(0,0,0,0))';
        return;
      }
      var rgb = kelvinToRGB(t);
      rojo = h !== undefined ? Math.round(255 * rojoLog(h)) : rgb.r;
      verde = rgb.g;
      azul = rgb.b;
      document.getElementById('rgb').innerHTML = 'r=' + rojo + ', g=' + verde + ' b=' + azul + ', i=' + brillo.toFixed(1);
      document.getElementById('acuario').style.background = 'linear-gradient(rgba(' + rojo + ',' + verde + ',' + azul + ',1),rgba(' + rojo + ',' + verde + ',' + azul + ',' + brillo.toFixed(1) + '))';
    }

    // --- Timer ---
    function calcTemp() {
      var h = decimalHora();
      if (h >= 12 && h < 20) {
        var factor = Math.sin((h - 12) * Math.PI / 8);
        temp = Math.round(6500 * factor);
        brillo = Math.round(factor * 10) / 10;
      } else {
        temp = 0;
        brillo = 0;
      }
    }

    function creaMatriz() {
      minuto += 10;
      if (minuto >= 60) { hora++; minuto = 0; }
      if (modo24h && hora >= 24) hora = 0;
      else if (!modo24h && hora >= 20) hora = 12;
      calcTemp();
      mostrarInfo();
      temperaturaRGB(temp, decimalHora());
      actualizarCursor();
    }

    function setModo() {
      modo24h = document.getElementById('modo24h').checked;
      hora = modo24h ? 0 : 12;
      minuto = 0;
      calcTemp();
      mostrarInfo();
      temperaturaRGB(temp, decimalHora());
      precalcularGrafica();
      dibujarGrafica();
      actualizarCursor();
    }

    // --- Graph ---
    function precalcularGrafica() {
      puntosGrafica = [];
      for (var m = 0; m <= 480; m += 10) {
        var h = 12 + m / 60;
        var factor = Math.sin((h - 12) * Math.PI / 8);
        var t = Math.round(6500 * factor);
        var rgb = calcularRGB(t, h);
        puntosGrafica.push({ hDec: h, r: rgb.r, g: rgb.g, b: rgb.b, brillo: Math.round(factor * 10) / 10 });
      }
    }

    function dibujarGrafica() {
      var c = document.getElementById('grafica');
      if (!c) return;
      var ctx = c.getContext('2d');

      ctx.fillStyle = '#0a1628';
      ctx.fillRect(0, 0, CW, CH);

      ctx.strokeStyle = '#1c3344';
      ctx.lineWidth = 0.5;
      for (var y = 0; y <= 100; y += 20) {
        var py = MT + GH - y / 100 * GH;
        ctx.beginPath(); ctx.moveTo(ML, py); ctx.lineTo(CW - MR, py); ctx.stroke();
      }
      for (var h = 12; h <= 20; h++) {
        var px = ML + (h - 12) / 8 * GW;
        ctx.beginPath(); ctx.moveTo(px, MT); ctx.lineTo(px, MT + GH); ctx.stroke();
      }

      ctx.fillStyle = '#6e96a8';
      ctx.font = '10px monospace';
      ctx.textAlign = 'center';
      for (var h = 12; h <= 20; h++)
        ctx.fillText(h + ':00', ML + (h - 12) / 8 * GW, CH - 5);
      ctx.textAlign = 'right';
      for (var y = 0; y <= 100; y += 20)
        ctx.fillText(y + '%', ML - 5, MT + GH - y / 100 * GH + 3);

      function curva(getVal, color) {
        ctx.strokeStyle = color;
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        for (var i = 0; i < puntosGrafica.length; i++) {
          var p = puntosGrafica[i];
          var px = ML + (p.hDec - 12) / 8 * GW;
          var py = MT + GH - getVal(p) / 100 * GH;
          i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
        }
        ctx.stroke();
      }

      curva(function (p) { return p.r / 255 * 100; }, '#ff6b4a');
      curva(function (p) { return p.g / 255 * 100; }, '#2ea043');
      curva(function (p) { return p.b / 255 * 100; }, '#1a7a7a');
      curva(function (p) { return p.brillo * 100; }, '#d4e6f0');

      ctx.font = '11px monospace';
      ctx.textAlign = 'left';
      for (var i = 0; i < CURVAS.length; i++) {
        var x = ML + 10, y = MT + 15 + i * 18;
        ctx.fillStyle = CURVAS[i].color;
        ctx.fillRect(x, y - 8, 12, 2);
        ctx.fillText(CURVAS[i].label, x + 16, y);
      }
    }

    function actualizarCursor() {
      var c = document.getElementById('grafica');
      if (!c) return;
      var ctx = c.getContext('2d');
      var h = decimalHora();
      dibujarGrafica();
      if (h >= 12 && h < 20) {
        var px = ML + (h - 12) / 8 * GW;
        ctx.strokeStyle = 'yellow';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(px, MT);
        ctx.lineTo(px, MT + GH);
        ctx.stroke();
      }
    }
  </script>
</head>

<body onload="setModo(); setInterval(creaMatriz, 1000)">
  <div class="acuario-wrapper">
    <div id="acuario"></div>
    <canvas id="grafica" width="800" height="500"></canvas>
  </div>
  <div id="parametros">
    <p id="tiempo">12:00</p>
    <p id="temperatura">0K</p>
    <p id="rgb">r=0, g=0, b=0, i=0.0</p>
    <p><label><input type="checkbox" id="modo24h" onchange="setModo()"> Ciclo 24h completo</label></p>
  </div>
</body>

</html>
